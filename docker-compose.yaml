version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"  # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: mentuser
      POSTGRES_PASSWORD: 0203
      POSTGRES_DB: mentproj_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - rabbitmq
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: ment.settings
      DB_HOST: db
      DB_NAME: mentproj_db
      DB_USER: mentuser
      DB_PASSWORD: 0203
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    volumes:
      - .:/app

  celery_worker:
    build: .
    command: celery -A ment worker
    depends_on:
      - db
      - rabbitmq
      - redis
    environment:
      DB_HOST: db
      DB_NAME: mentproj_db
      DB_USER: mentuser
      DB_PASSWORD: 0203
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    volumes:
      - .:/app

  celery_beat:
    build: .
    command: celery -A ment beat --loglevel=info
    depends_on:
      - db
      - rabbitmq
      - redis
    environment:
      DB_HOST: db
      DB_NAME: mentproj_db
      DB_USER: mentuser
      DB_PASSWORD: 0203
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    volumes:
      - .:/app

volumes:
  rabbitmq_data:
  postgres_data:
